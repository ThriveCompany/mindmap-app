<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapmind - Signup</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="auth-page">
        <div class="background">
            <span class="bg-blob blob-1"></span>
            <span class="bg-blob blob-2"></span>
            <span class="bg-blob blob-3"></span>
        </div>
        <div class="card glass-card">
            <div class="card-header">
                <p class="eyebrow">Welcome to</p>
                <h1>Mapmind</h1>
            </div>
            <form id="signup-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-group">
                <label for="confirm-password">Confirm Password</label>
                <input type="password" id="confirm-password" required>
            </div>
            <button type="submit">Sign Up</button>
            <div id="signup-error" class="error" style="display: none;"></div>
            <div id="signup-success" class="success" style="display: none;"></div>
        </form>
        </form>
        <div class="link">
            <a href="login.html">Already have an account? Login</a>
        </div>
    </div>
</div>
    <script src="auth.js"></script>
    <script>
        document.getElementById('signup-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            hideError('signup-error');
            hideSuccess('signup-success');
            signup(username, password, confirmPassword);
        });
    </script>
</body>
</html>
