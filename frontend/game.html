<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindmap - Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>

    <div class="game-container">
        <div class="glass-card game-setup" id="setup-card">
            <h2>Start a Guided Match</h2>
            <div class="helper">
                <p id="setup-helper">Choose your range and lock your secret number inside it.</p>
            </div>
            <div id="setup-feedback" class="error hidden"></div>

            <div class="range-input">
                <label for="min-range">Min Range:</label>
                <input type="number" id="min-range" value="1" min="1">
                <label for="max-range">Max Range:</label>
                <input type="number" id="max-range" value="100" min="2">
            </div>

            <div class="number-input">
                <label for="user-number">Lock in your number:</label>
                <input type="number" id="user-number" placeholder="Enter your secret number">
            </div>

            <button id="start-game-btn" class="btn-primary" onclick="startGame()">Start Game</button>
            <button class="btn-secondary" onclick="backToDashboard()">Back to Dashboard</button>
        </div>

        <div class="glass-card game-ui hidden" id="game-ui">
            <div class="range-display">
                <h3>Current Range: <span id="current-range">1 – 100</span></h3>
            </div>

            <div class="helper">
                <p id="helper-text">Midpoint suggestion: 50</p>
                <p id="range-size-text">100 numbers remaining</p>
            </div>

            <div id="game-feedback" class="error hidden"></div>

            <div class="chat-messages" id="chat-messages"></div>

            <div class="guess-input">
                <input type="number" id="guess-input" placeholder="Enter your guess" min="1" max="100">
                <button id="submit-guess-btn" class="btn-primary" onclick="submitGuess()">Guess</button>
            </div>

            <div class="suggestions" id="suggestions" style="display: none;">
                <p>Suggestions:</p>
                <div id="suggestion-buttons"></div>
            </div>

            <button class="btn-secondary" onclick="endGame()">Back to Dashboard</button>
        </div>
    </div>

    <script src="auth.js"></script>
    <script src="game.js"></script>
</body>
</html>
