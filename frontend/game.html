<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindmap - Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>
    <div class="game-container">
        <div class="glass-card game-setup" id="setup-card">
            <h2>Setup Your Game</h2>
            <div class="range-input">
                <label>Min Range:</label>
                <input type="number" id="min-range" value="1" min="1">
                <label>Max Range:</label>
                <input type="number" id="max-range" value="100" min="1">
            </div>
            <div class="number-input">
                <label>Lock in your number:</label>
                <input type="number" id="user-number" placeholder="Enter your secret number">
            </div>
            <button class="btn-primary" onclick="startGame()">Start Game</button>
            <button class="btn-secondary" onclick="backToDashboard()">Back to Dashboard</button>
        </div>

        <div class="glass-card game-ui" id="game-ui" style="display: none;">
            <div class="range-display">
                <h3>Current Range: <span id="current-range">1 – 100</span></h3>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="message system">[System] Range: 1 – 100</div>
                <div class="message system">[System] Lock in your number</div>
            </div>
            <div class="guess-input">
                <input type="number" id="guess-input" placeholder="Enter your guess" min="1" max="100">
                <button class="btn-primary" onclick="submitGuess()">Guess</button>
            </div>
            <div class="suggestions" id="suggestions" style="display: none;">
                <p>Suggestions:</p>
                <div id="suggestion-buttons"></div>
            </div>
            <div class="helper">
                <p id="helper-text"></p>
            </div>
            <button class="btn-secondary" onclick="endGame()">End Game</button>
        </div>
    </div>
    <script src="auth.js"></script>
    <script>
        const API_BASE = 'https://mindmap-backend-gys8.onrender.com';
        let currentGame = null;

        checkAuth();

        function backToDashboard() {
            window.location.href = 'dashboard.html';
        }

        async function startGame() {
            const minRange = parseInt(document.getElementById('min-range').value);
            const maxRange = parseInt(document.getElementById('max-range').value);
            const userNumber = parseInt(document.getElementById('user-number').value);

            if (minRange >= maxRange || userNumber < minRange || userNumber > maxRange) {
                alert('Invalid range or number');
                return;
            }

            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/games`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        min_range: minRange,
                        max_range: maxRange,
                        user_number: userNumber
                    })
                });
                if (response.ok) {
                    const game = await response.json();
                    currentGame = game;
                    showGameUI(game);
                } else {
                    alert('Failed to start game');
                }
            } catch (error) {
                alert('Error starting game');
            }
        }

        function showGameUI(game) {
            document.getElementById('setup-card').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            updateRange(game.current_min, game.current_max);
            updateMessages(game.messages);
            updateSuggestions(game.current_min, game.current_max);
            updateHelper(game.current_min, game.current_max);
        }

        function updateRange(min, max) {
            document.getElementById('current-range').textContent = `${min} – ${max}`;
            document.getElementById('guess-input').min = min;
            document.getElementById('guess-input').max = max;
        }

        function updateMessages(messages) {
            const chat = document.getElementById('chat-messages');
            chat.innerHTML = '';
            messages.forEach(msg => {
                const div = document.createElement('div');
                div.className = 'message system';
                div.textContent = `[System] ${msg}`;
                chat.appendChild(div);
            });
            chat.scrollTop = chat.scrollHeight;
        }

        function updateSuggestions(min, max) {
            const suggestionsDiv = document.getElementById('suggestions');
            const buttonsDiv = document.getElementById('suggestion-buttons');
            if (max - min + 1 <= 10) {
                suggestionsDiv.style.display = 'block';
                buttonsDiv.innerHTML = '';
                for (let i = min; i <= max; i++) {
                    const btn = document.createElement('button');
                    btn.className = 'suggestion-btn';
                    btn.textContent = i;
                    btn.onclick = () => setGuess(i);
                    buttonsDiv.appendChild(btn);
                }
            } else {
                suggestionsDiv.style.display = 'none';
            }
        }

        function updateHelper(min, max) {
            const midpoint = Math.floor((min + max) / 2);
            document.getElementById('helper-text').textContent = `Best guess: midpoint = ${midpoint}`;
        }

        function setGuess(num) {
            document.getElementById('guess-input').value = num;
        }

        async function submitGuess() {
            const guess = parseInt(document.getElementById('guess-input').value);
            if (!guess || guess < currentGame.current_min || guess > currentGame.current_max) {
                alert('Invalid guess');
                return;
            }

            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/games/${currentGame.id}/guess`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ guess })
                });
                if (response.ok) {
                    const game = await response.json();
                    currentGame = game;
                    updateRange(game.current_min, game.current_max);
                    updateMessages(game.messages);
                    updateSuggestions(game.current_min, game.current_max);
                    updateHelper(game.current_min, game.current_max);
                    if (game.status !== 'active') {
                        setTimeout(() => {
                            alert(game.status === 'won' ? 'You won!' : 'You lost!');
                            window.location.href = 'dashboard.html';
                        }, 2000);
                    }
                } else {
                    alert('Failed to submit guess');
                }
            } catch (error) {
                alert('Error submitting guess');
            }
        }

        function endGame() {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
