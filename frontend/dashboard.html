<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mindmap - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>
    <div class="glass-card dashboard-card">
        <h1>Mindmap Dashboard</h1>
        <div class="stats">
            <div class="stat">
                <h3>Total Wins</h3>
                <p id="wins">0</p>
            </div>
            <div class="stat">
                <h3>Total Losses</h3>
                <p id="losses">0</p>
            </div>
            <div class="stat">
                <h3>Games Played</h3>
                <p id="games-played">0</p>
            </div>
            <div class="stat">
                <h3>Win Rate</h3>
                <p id="win-rate">0%</p>
            </div>
        </div>
        <button class="btn-primary" onclick="startGame()">Start 1v1 Game</button>
        <button class="btn-secondary" onclick="logout()">Logout</button>
    </div>
    <script src="auth.js"></script>
    <script>
        const API_BASE = 'https://mindmap-backend-gys8.onrender.com';

        // Check if user is authenticated on page load
        checkAuth();

        // Fetch and display user info and stats
        async function loadUserInfo() {
            const token = getToken();
            try {
                const response = await fetch(`${API_BASE}/me`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('user-info').textContent = `Hello, ${user.username}!`;
                    document.getElementById('wins').textContent = user.wins;
                    document.getElementById('losses').textContent = user.losses;
                    document.getElementById('games-played').textContent = user.games_played;
                    document.getElementById('win-rate').textContent = `${user.win_rate}%`;
                } else {
                    logout();
                }
            } catch (error) {
                logout();
            }
        }

        function startGame() {
            window.location.href = 'game.html';
        }

        loadUserInfo();
    </script>
</body>
</html>
